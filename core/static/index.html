<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starfish Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="header glass">
        <h1><span>Starfish</span> Agent</h1>
        <div style="display:flex;align-items:center;gap:12px;">
            <button class="settings-btn" onclick="openSettings()" title="设置">&#9881;</button>
            <span class="header-info"><span class="status-dot"></span>在线</span>
        </div>
    </header>

    <div class="control-toggle">
        <button class="toggle-btn glass" onclick="togglePanel()">
            <span id="toggleIcon">&#9660;</span> 控制面板
        </button>
    </div>

    <div class="control-panel glass" id="controlPanel">
        <div class="control-inner">
            <div class="btn-group">
                <button class="btn btn-evolve" onclick="doEvolve(false)" id="btn-evolve">&#128260; 预览</button>
                <button class="btn btn-apply" onclick="doEvolve(true)" id="btn-apply">&#10004; 执行</button>
                <button class="btn btn-snapshot" onclick="takeSnapshot()">&#128247; 快照</button>
                <button class="btn btn-rollback" onclick="doRollback()">&#8617; 回滚</button>
            </div>
            <div class="snapshot-section">
                <div class="snapshot-label">选择快照后点击回滚</div>
                <div class="snapshot-list" id="snapshotList">加载中...</div>
            </div>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="message assistant">
            你好！我是 Starfish Agent，随时为你效劳。
            <span class="time" id="welcomeTime"></span>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper glass">
            <input type="text" id="userInput" placeholder="输入消息..." onkeypress="handleKey(event)">
            <button class="send-btn" onclick="send()" id="sendBtn">&#10148;</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal" onclick="closeSettingsOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title">LLM 设置</div>
                <button class="modal-close" onclick="closeSettings()">&times;</button>
            </div>
            <div class="form-group">
                <label>模型名称 (LLM_MODEL)</label>
                <input type="text" id="settingModel" placeholder="例如: gpt-4">
            </div>
            <div class="form-group">
                <label>API 地址 (LLM_BASE_URL)</label>
                <input type="text" id="settingBaseUrl" placeholder="例如: https://api.openai.com/v1">
            </div>
            <div class="form-group">
                <label>API 密钥 (LLM_API_KEY)</label>
                <input type="password" id="settingApiKey" placeholder="your-api-key">
            </div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" onclick="closeSettings()">取消</button>
                <button class="modal-btn modal-btn-primary" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
